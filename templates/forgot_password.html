<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Placement Cell</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body style="background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 45%, #4338ca 100%);" class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">
    <h1 class="text-2xl font-bold text-gray-800 mb-2">Forgot Password</h1>
    <p class="text-gray-500 mb-6">Enter your {{ role }} email to receive OTP for password reset.</p>

    <form method="POST" action="{{ url_for('forgot_password', role=role) }}" class="space-y-4">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
        <input type="email" name="email" required class="w-full border-2 border-gray-200 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500" placeholder="Enter your email">
      </div>

      {% if error %}
      <div class="bg-red-50 border-l-4 border-red-500 p-3 rounded text-red-700 text-sm">{{ error }}</div>
      {% endif %}

      <button type="submit" style="background:#2563eb;color:#fff;" class="w-full py-3 rounded-lg font-semibold">Send OTP</button>
    </form>

    <div class="mt-5 text-center">
      {% if role == 'admin' %}
      <a href="{{ url_for('admin_login') }}" class="text-blue-600 hover:text-blue-800 font-semibold text-sm">Back to Admin Login</a>
      {% else %}
      <a href="{{ url_for('student_login') }}" class="text-blue-600 hover:text-blue-800 font-semibold text-sm">Back to Student Login</a>
      {% endif %}
    </div>
  </div>
</body>
</html>
