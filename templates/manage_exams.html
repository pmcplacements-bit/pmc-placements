<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Exams | Placement Cell</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    .hover-lift { transition: all 0.3s; }
    .hover-lift:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- Enhanced Navbar -->
  <nav class="bg-blue-800 text-white shadow-2xl">
    <div class="max-w-7xl mx-auto px-6 py-4">
      <div class="flex justify-between items-center">
        <div class="flex items-center space-x-4">
          <div class="bg-white bg-opacity-20 rounded-lg p-2">
            <span class="material-icons text-3xl">folder_open</span>
          </div>
          <div>
            <h1 class="font-bold text-2xl">Manage Exams</h1>
            <p class="text-xs text-blue-100">View, Edit & Delete Exams</p>
          </div>
        </div>
        <a href="{{ url_for('admin_dashboard') }}" class="bg-white text-blue-800 px-6 py-2 rounded-lg hover:bg-blue-50 transition flex items-center gap-2 shadow-lg">
          <span class="material-icons text-sm">dashboard</span>
          <span>Dashboard</span>
        </a>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 py-8">
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-3xl font-bold text-gray-800 flex items-center gap-3">
        <span class="material-icons text-4xl text-blue-600">assignment</span>
        All Exams
      </h2>
      <button onclick="location.reload()" class="flex items-center gap-2 bg-blue-100 hover:bg-blue-200 text-blue-700 px-4 py-2 rounded-lg transition">
        <span class="material-icons text-sm">refresh</span>
        <span class="text-sm font-semibold">Refresh</span>
      </button>
    </div>
    <div id="examsPanel" class="grid grid-cols-1 gap-6 mb-8"></div>
    <div id="editPanel" class="bg-white rounded-2xl shadow-2xl p-8" style="display:none;"></div>
  </div>

  <script>
    const supabaseClient = window.supabase.createClient(
      'https://kflhmnyikwaznzkgeini.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmbGhtbnlpa3dhem56a2dlaW5pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ1NTQ5MDEsImV4cCI6MjA4MDEzMDkwMX0.nTkrtt4SQEYLq529ccYvnR46L1mbzBzagoVifP2VkWQ'
    );
    let exams = [];
    async function loadExams() {
      const { data, error } = await supabaseClient.from('exams').select('*');
      if (error) {
        document.getElementById('examsPanel').innerHTML = `<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-xl">${error.message}</div>`;
        return;
      }
      exams = data || [];
      
      if (exams.length === 0) {
        document.getElementById('examsPanel').innerHTML = '<div class="col-span-2 bg-gray-100 border-2 border-dashed border-gray-300 rounded-xl p-8 text-center"><span class="material-icons text-6xl text-gray-400 mb-2">assignment</span><p class="text-gray-500 text-lg">No exams created yet.</p></div>';
        return;
      }
      
      let html = '';
      for (const exam of exams) {
        const examDate = exam.date ? new Date(exam.date).toLocaleString() : 'No date set';
        html += `<div class="bg-white rounded-2xl shadow-lg hover-lift border-l-4 border-blue-500">
          <div class="p-6">
            <div class="flex items-start justify-between mb-4">
              <div class="flex items-center gap-3">
                <div class="bg-blue-100 rounded-xl p-3">
                  <span class="material-icons text-blue-600 text-3xl">description</span>
                </div>
                <div>
                  <h3 class="font-bold text-2xl text-gray-800">${exam.title}</h3>
                  <p class="text-sm text-gray-500 mt-1">
                    <span class="material-icons text-xs align-middle">schedule</span> ${examDate}
                    ${exam.duration ? ` | <span class="material-icons text-xs align-middle">timer</span> ${exam.duration} min` : ''}
                  </p>
                </div>
              </div>
            </div>
            <p class="text-gray-600 mb-4">${exam.instructions || 'No instructions provided'}</p>
            <div class="flex gap-3">
              <button onclick="window.editExam('${exam.id}')" class="flex-1 bg-yellow-500 text-white py-3 rounded-lg font-bold hover:bg-yellow-600 transition flex items-center justify-center gap-2">
                <span class="material-icons text-sm">edit</span>
                <span>Edit Exam</span>
              </button>
              <button onclick="window.deleteExam('${exam.id}')" class="flex-1 bg-red-500 text-white py-3 rounded-lg font-bold hover:bg-red-600 transition flex items-center justify-center gap-2">
                <span class="material-icons text-sm">delete</span>
                <span>Delete</span>
              </button>
            </div>
          </div>
        </div>`;
      }
      document.getElementById('examsPanel').innerHTML = html;
    }
    window.deleteExam = async function(id) {
      if (confirm('Delete this exam? All related questions, assignments, submissions, and results will also be deleted.')) {
        await supabaseClient.from('questions').delete().eq('exam_id', id);
        await supabaseClient.from('student_exam_map').delete().eq('exam_id', id);
        await supabaseClient.from('submissions').delete().eq('exam_id', id);
        await supabaseClient.from('results').delete().eq('exam_id', id);
        await supabaseClient.from('exams').delete().eq('id', id);
        loadExams();
      }
    };
    window.editExam = async function(id) {
      const exam = exams.find(e => e.id === id);
      if (!exam) return;
      
      window.scrollTo({ top: 0, behavior: 'smooth' });
      
      let html = `<div class="flex items-center justify-between mb-6 pb-4 border-b-2">
        <h3 class='text-3xl font-bold text-gray-800 flex items-center gap-3'>
          <span class="material-icons text-blue-600 text-4xl">edit</span>
          Edit Exam: ${exam.title}
        </h3>
        <button onclick="document.getElementById('editPanel').style.display='none'" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-lg flex items-center gap-2">
          <span class="material-icons text-sm">close</span>
          <span>Cancel</span>
        </button>
      </div>
      <form id='editExamForm' class='space-y-6 mb-8'>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class='block font-semibold text-gray-700 mb-2'>Exam Title</label>
            <input type='text' id='editTitle' class='w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none' value='${exam.title}' required>
          </div>
          <div>
            <label class='block font-semibold text-gray-700 mb-2'>Duration (minutes)</label>
            <input type='number' id='editDuration' class='w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none' value='${exam.duration || ''}' placeholder='e.g., 60'>
          </div>
        </div>
        <div>
          <label class='block font-semibold text-gray-700 mb-2'>Instructions</label>
          <textarea id='editInstructions' class='w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none' rows='4' required>${exam.instructions || ''}</textarea>
        </div>
        <button type='submit' class='w-full bg-blue-600 text-white py-4 rounded-lg font-bold hover:bg-blue-700 transition flex items-center justify-center gap-2'>
          <span class="material-icons">save</span>
          <span>Save Changes</span>
        </button>
      </form>
      <div class='bg-gray-50 rounded-xl p-6'>
        <h4 class='text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2'>
          <span class="material-icons text-purple-600 text-3xl">quiz</span>
          Questions (${await getQuestionCount(id)})
        </h4>
        <div id='editQuestions'></div>
      </div>`;
      document.getElementById('editPanel').innerHTML = html;
      document.getElementById('editPanel').style.display = 'block';
      document.getElementById('editExamForm').onsubmit = async function(e) {
        e.preventDefault();
        const title = document.getElementById('editTitle').value;
        const instructions = document.getElementById('editInstructions').value;
        const duration = document.getElementById('editDuration').value;
        await supabaseClient.from('exams').update({ title, instructions, duration: duration || null }).eq('id', id);
        alert('Exam updated successfully!');
        loadExams();
        document.getElementById('editPanel').style.display = 'none';
      };
      // Load questions for this exam
      const { data: questions } = await supabaseClient.from('questions').select('*').eq('exam_id', id);
      let qHtml = questions && questions.length > 0 ? '<div class="grid grid-cols-1 gap-4">' : '<div class="text-gray-500 text-center py-4">No questions added yet</div>';
      for (const q of questions || []) {
        qHtml += `<div class='bg-white border-2 border-gray-200 rounded-lg p-4 hover:border-purple-300 transition'>\n          <div class='font-bold text-gray-800 mb-2'>${q.question_text}</div>\n          <div class='flex gap-2'>\n            <button class='flex-1 bg-yellow-500 text-white px-4 py-2 rounded-lg hover:bg-yellow-600 transition flex items-center justify-center gap-1' onclick="window.editQuestion('${q.id}','${id}')"><span class=\"material-icons text-sm\">edit</span> Edit</button>\n            <button class='flex-1 bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition flex items-center justify-center gap-1' onclick="window.deleteQuestion('${q.id}','${id}')"><span class=\"material-icons text-sm\">delete</span> Delete</button>\n          </div>\n        </div>`;
      }
      if (questions && questions.length > 0) qHtml += '</div>';
      document.getElementById('editQuestions').innerHTML = qHtml;
    };
    
    async function getQuestionCount(examId) {
      const { data } = await supabaseClient.from('questions').select('id').eq('exam_id', examId);
      return data ? data.length : 0;
    };
    window.editQuestion = async function(qid, examId) {
      // Fetch question details
      const { data: q, error } = await supabaseClient.from('questions').select('*').eq('id', qid).single();
      if (error || !q) return alert('Failed to load question.');
      // Parse options
      let opts = [];
      try { opts = typeof q.options === 'string' ? JSON.parse(q.options) : q.options; } catch { opts = q.options || []; }
      let html = `<h4 class='font-bold mb-2'>Edit Question</h4>
        <form id='editQuestionForm' class='space-y-2'>
          <label class='block font-semibold'>Question Text</label>
          <textarea id='editQText' class='w-full px-4 py-2 border rounded' required>${q.question_text}</textarea>
          <label class='block font-semibold'>Options</label>
          <input type='text' id='editOpt1' class='w-full px-4 py-2 border rounded' value='${opts[0]||''}' required>
          <input type='text' id='editOpt2' class='w-full px-4 py-2 border rounded' value='${opts[1]||''}' required>
          <input type='text' id='editOpt3' class='w-full px-4 py-2 border rounded' value='${opts[2]||''}' required>
          <input type='text' id='editOpt4' class='w-full px-4 py-2 border rounded' value='${opts[3]||''}' required>
          <label class='block font-semibold'>Correct Answer</label>
          <select id='editCorrect' class='w-full px-4 py-2 border rounded' required>
            <option value=''>Select</option>
            <option value='${opts[0]||''}' ${q.correct_answer===opts[0]?'selected':''}>${opts[0]||''}</option>
            <option value='${opts[1]||''}' ${q.correct_answer===opts[1]?'selected':''}>${opts[1]||''}</option>
            <option value='${opts[2]||''}' ${q.correct_answer===opts[2]?'selected':''}>${opts[2]||''}</option>
            <option value='${opts[3]||''}' ${q.correct_answer===opts[3]?'selected':''}>${opts[3]||''}</option>
          </select>
          <button type='submit' class='bg-blue-600 text-white px-4 py-2 rounded'>Save Question</button>
        </form>`;
      document.getElementById('editPanel').innerHTML += html;
      document.getElementById('editQuestionForm').onsubmit = async function(e) {
        e.preventDefault();
        const question_text = document.getElementById('editQText').value;
        const options = [
          document.getElementById('editOpt1').value,
          document.getElementById('editOpt2').value,
          document.getElementById('editOpt3').value,
          document.getElementById('editOpt4').value
        ];
        const correct_answer = document.getElementById('editCorrect').value;
        await supabaseClient.from('questions').update({
          question_text,
          options: JSON.stringify(options),
          correct_answer
        }).eq('id', qid);
        window.editExam(examId);
      };
    };
    window.deleteQuestion = async function(qid, examId) {
      if (confirm('Delete this question?')) {
        await supabaseClient.from('questions').delete().eq('id', qid);
        // Reload questions for current exam
        window.editExam(examId);
      }
    };
    loadExams();
  </script>
</body>
</html>
