<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Placement Cell</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-500 via-blue-600 to-blue-800 flex items-center justify-center min-h-screen p-4">
  <!-- Back to Home -->
  <a href="{{ url_for('index') }}" class="absolute top-4 left-4 text-white hover:text-blue-100 flex items-center font-semibold">
    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
    </svg>
    Back to Home
  </a>

  <div class="bg-white shadow-2xl rounded-2xl p-8 md:p-12 w-full max-w-md transform transition-all hover:scale-[1.01]">
    <!-- Icon/Logo -->
    <div class="text-center mb-8">
      <div class="inline-block bg-blue-100 rounded-full p-6 mb-4">
        <svg class="w-16 h-16 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-gray-800 mb-2">Admin Portal</h1>
      <p class="text-gray-500">Placement Cell Management System</p>
    </div>

    <form method="POST" action="{{ url_for('admin_login') }}" class="space-y-6">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"></path>
            </svg>
          </div>
          <input type="email" name="email" class="w-full pl-10 pr-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition" placeholder="admin@example.com" required>
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
            </svg>
          </div>
          <input type="password" name="password" class="w-full pl-10 pr-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition" placeholder="••••••••" required>
        </div>
        <div class="mt-2 text-right">
          <a href="{{ url_for('forgot_password', role='admin') }}" class="text-sm text-blue-600 hover:text-blue-800 font-semibold">Forgot password?</a>
        </div>
      </div>

      {% if request.args.get('reset') == 'success' %}
      <div class="bg-green-50 border-l-4 border-green-500 p-4 rounded">
        <span class="text-green-700 font-semibold">Password reset successful. Please sign in with your new password.</span>
      </div>
      {% endif %}

      {% if error %}
      <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded">
        <div class="flex items-center">
          <svg class="h-5 w-5 text-red-500 mr-2" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
          </svg>
          <span class="text-red-700 font-semibold">{{ error }}</span>
        </div>
      </div>
      {% endif %}

      <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white py-4 rounded-lg hover:from-blue-700 hover:to-blue-800 font-bold text-lg shadow-lg transform transition hover:scale-[1.02] focus:ring-4 focus:ring-blue-300">
        Sign In as Admin
      </button>
    </form>

    <div class="mt-6 text-center text-sm text-gray-500">
      <p>Authorized access only</p>
    </div>
  </div>
</body>
</html>
